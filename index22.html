<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Alany</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100vw;
  height:100dvh;
  overflow:hidden;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial,sans-serif;
}

.contenedor{
  position:relative;
  width:100vw;
  height:100dvh;
}

.imagen-principal{
  width:100vw;
  height:100dvh;
  object-fit:contain;
  background:rgb(190,177,177);
}

/* WhatsApp */
.boton-whatsapp{
  position:absolute;
  left:55%;
  top:77%;
  width:90px;
  height:90px;
  transform:translate(-50%,-50%);
  z-index:999;
  cursor:pointer;
}

/* Texto debajo del WhatsApp */
.texto-ubicacion{
  position:absolute;
  left:55%;
  top:87%;
  transform:translateX(-50%);
  font-size:16px;
  font-weight:bold;
  color:#0b19d6;
  text-align:center;

  z-index:999;
}

/* Botón música */
.boton-musica{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff69b4;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:25px;
  cursor:pointer;
  font-size:14px;
  z-index:1000;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

.boton-musica:hover{
  background:#ff1493;
}
</style>
</head>
<body>

<div class="contenedor">

  <img src="AYLANII.png" alt="Invitación" class="imagen-principal">

  <a href="https://w.app/5c6hig"
     target="_blank"
     class="boton-whatsapp">
  </a>

  <p class="texto-ubicacion">
    Ubicación<br>
    por interno
  </p>

</div>

<audio id="bg-music" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<button class="boton-musica" id="btn-musica">
  🎵 Música
</button>

<script>
const music = document.getElementById("bg-music");
const btnMusica = document.getElementById("btn-musica");

const tiempoGuardado = localStorage.getItem("musicTime");

if (tiempoGuardado) {
  music.currentTime = tiempoGuardado;
}

document.addEventListener("click", () => {
  music.play();
}, { once:true });

setInterval(() => {
  localStorage.setItem("musicTime", music.currentTime);
}, 1000);

btnMusica.addEventListener("click", () => {

  if (music.paused) {
    music.play();
    btnMusica.textContent = "🔊 Música";
  } else {
    music.pause();
    btnMusica.textContent = "🎵 Música";
  }

});
</script>

</body>
</html>
